frr version 10.5
frr defaults traditional
hostname ISP2
no ipv6 forwarding
service integrated-vtysh-config
!
interface lo
 ip address 10.255.2.1/32
!
interface eth1
 ip address 10.0.11.2/30
!
interface eth2
 ip address 10.0.20.2/30
!
interface eth3
 ip address 10.0.31.2/30
!
router bgp 65200
 bgp router-id 10.255.2.1
 no bgp ebgp-requires-policy
 neighbor 10.0.11.1 remote-as 65001
 neighbor 10.0.11.1 description CompanyA
 neighbor 10.0.20.1 remote-as 65100
 neighbor 10.0.20.1 description ISP1
 neighbor 10.0.31.1 remote-as 65002
 neighbor 10.0.31.1 description CompanyB
 !
 address-family ipv4 unicast
  neighbor 10.0.11.1 activate
  neighbor 10.0.11.1 soft-reconfiguration inbound
  neighbor 10.0.11.1 send-community all
  neighbor 10.0.20.1 activate
  neighbor 10.0.20.1 soft-reconfiguration inbound
  neighbor 10.0.20.1 send-community all
  neighbor 10.0.31.1 activate
  neighbor 10.0.31.1 soft-reconfiguration inbound
  neighbor 10.0.31.1 send-community all
 exit-address-family
!
line vty
!
