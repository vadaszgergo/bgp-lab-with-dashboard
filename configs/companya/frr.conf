frr version 10.5
frr defaults traditional
hostname companyA
no ipv6 forwarding
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.1/32
 ip address 10.1.1.1/32
!
interface eth1
 ip address 10.0.10.1/30
!
interface eth2
 ip address 10.0.11.1/30
!
ip route 10.1.1.0/24 Null0
!
router bgp 65001
 bgp router-id 10.255.0.1
 no bgp ebgp-requires-policy
 neighbor 10.0.10.2 remote-as 65100
 neighbor 10.0.10.2 description ISP1
 neighbor 10.0.11.2 remote-as 65200
 neighbor 10.0.11.2 description ISP2
 !
 address-family ipv4 unicast
  network 10.1.1.0/24
  neighbor 10.0.10.2 activate
  neighbor 10.0.10.2 soft-reconfiguration inbound
  neighbor 10.0.10.2 send-community all
  neighbor 10.0.11.2 activate
  neighbor 10.0.11.2 soft-reconfiguration inbound
  neighbor 10.0.11.2 send-community all
 exit-address-family
!
line vty
!
