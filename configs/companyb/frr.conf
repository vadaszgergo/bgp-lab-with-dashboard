frr version 10.5
frr defaults traditional
hostname companyB
no ipv6 forwarding
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.2/32
 ip address 192.168.1.1/32
!
interface eth1
 ip address 10.0.30.1/30
!
interface eth2
 ip address 10.0.31.1/30
!
ip route 192.168.1.0/24 Null0
!
router bgp 65002
 bgp router-id 10.255.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.30.2 remote-as 65100
 neighbor 10.0.30.2 description ISP1
 neighbor 10.0.31.2 remote-as 65200
 neighbor 10.0.31.2 description ISP2
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  neighbor 10.0.30.2 activate
  neighbor 10.0.30.2 soft-reconfiguration inbound
  neighbor 10.0.30.2 send-community all
  neighbor 10.0.31.2 activate
  neighbor 10.0.31.2 soft-reconfiguration inbound
  neighbor 10.0.31.2 send-community all
 exit-address-family
!
line vty
!
